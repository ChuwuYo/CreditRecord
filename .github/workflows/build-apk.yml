name: Build APK

# 手动触发（Actions 页面点 "Run workflow"，可选任意分支）或推送到 main 时构建 release APK。
# 产物：1) 本次运行的 Artifacts（cardrecord-release-apk，zip，需登录）；
#       2) 发到滚动预发布 Release「apk-latest」，提供免登录的 .apk 直链（手机可直接下）。
on:
  workflow_dispatch:
  push:
    branches: [ main ]

# 需要 write 才能由 runner 创建/更新 Release（不受本沙箱 tag push 限制，走 GITHUB_TOKEN）
permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools" > /dev/null

      # 仓库里的 gradlew 是本地沙箱专用的桩（直接 exec mise 的 gradle），
      # GitHub runner 上没有那条路径，所以这里改用官方 action 安装真正的 Gradle，
      # 再用 `gradle` 命令构建，不碰仓库里的 gradlew。
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.4'
          dependency-graph: disabled

      # gradle.properties 里写死的 127.0.0.1:18080 是本地沙箱的出口代理，
      # runner 上不存在，会让依赖下载卡死/失败。CI 运行时剥掉这几行
      # （只改 runner 的工作副本，不提交回仓库，沙箱构建仍可用代理）。
      - name: Disable sandbox-only Maven proxy
        run: |
          sed -i -E '/^systemProp\.(http|https)\.(proxyHost|proxyPort|nonProxyHosts)=/d' gradle.properties

      # release 构建复用 debug 签名密钥（见 app/build.gradle.kts 的 signingConfigs），
      # 未签名 APK 装不上。这里用标准 debug 凭据重建一个 debug.keystore。
      - name: Generate debug keystore
        run: |
          mkdir -p "$HOME/.android"
          keytool -genkeypair -v \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android -keypass android \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build release APK
        run: gradle :app:assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cardrecord-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      # 读出 versionName，仅用于 Release 标题/说明展示
      - name: Read versionName
        id: ver
        run: echo "name=$(grep -oP 'versionName = \"\K[^\"]+' app/build.gradle.kts)" >> "$GITHUB_OUTPUT"

      # 把 APK 发到滚动预发布「apk-latest」：每次构建把该 tag 移到当前提交并覆盖同名资产，
      # 下载直链固定不变：
      #   https://github.com/<owner>/<repo>/releases/download/apk-latest/app-release.apk
      - name: Publish APK to rolling pre-release (apk-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: 最新测试包 v${{ steps.ver.outputs.name }}
          prerelease: true
          body: |
            自动构建的最新可安装 APK（**debug 签名，仅供测试**，非正式版本发布）。
            - 版本：v${{ steps.ver.outputs.name }}
            - 提交：${{ github.sha }}
            - 分支：${{ github.ref_name }}

            直接下载下方 Assets 里的 `app-release.apk` 即可安装。
          files: app/build/outputs/apk/release/app-release.apk
