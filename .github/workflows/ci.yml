name: CI

# 验证关：对所有分支的 push 和 PR 跑 ktlint + JVM 单元测试。
# 与 build-apk.yml 分工：本工作流只做静态检查 + 测试，不出 APK。
on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# 同分支新推送自动取消旧运行，省 runner 额度
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          yes | sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools" > /dev/null

      # 仓库的 gradlew 是沙箱专用桩，runner 上用官方 action 装真 Gradle，用 `gradle` 命令。
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.4'
          dependency-graph: disabled

      # gradle.properties 写死的本地代理在 runner 上不存在，运行时剥掉（不提交回仓库）。
      - name: Disable sandbox-only Maven proxy
        run: |
          sed -i -E '/^systemProp\.(http|https)\.(proxyHost|proxyPort|nonProxyHosts)=/d' gradle.properties

      - name: ktlint
        run: |
          gradle ktlintCheck --no-daemon || {
            echo "::group::ktlint violation reports"
            find app/build/reports/ktlint -name '*.txt' -exec sh -c 'echo "== $1 =="; cat "$1"' _ {} \;
            echo "::endgroup::"
            exit 1
          }

      - name: Unit tests
        run: gradle :app:testDebugUnitTest --no-daemon --stacktrace

      # 测试报告留档，失败时方便排查
      - name: Upload test report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore
